<head>

  <style>
    :root {
      --bg-950: #0f1418;
      --bg-920: #141a1f;
      --bg-880: rgba(24, 31, 38, 0.84);
      --bg-840: rgba(15, 20, 25, 0.92);

      --accent-gold: #d4b085;
      --shadow-soft: 0 24px 60px rgba(0, 0, 0, 0.28);
      --shadow-deep: 0 40px 90px rgba(0, 0, 0, 0.45);
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Manrope", system-ui, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(122, 51, 65, 0.14), transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(184, 141, 99, 0.08), transparent 18%),
        linear-gradient(180deg, #11171c 0%, #0d1217 52%, #0f1418 100%);

      font-family: var(--font-sans);
      overflow: hidden;
      height: 100dvh;
      user-select: none;
      -webkit-user-select: none;
      padding-top: 76px;
      box-sizing: border-box;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 76px;
      background: rgba(13, 17, 22, 0.72);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 22px;
      box-sizing: border-box;
      z-index: 20;
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
    }

    .project-title {
      font-family: var(--font-serif);
      font-weight: 600;
      color: var(--text-main);
      text-transform: uppercase;
      font-size: 1.15rem;
      letter-spacing: 0.14em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70vw;
    }

    .close-btn {
      background: linear-gradient(135deg, rgba(124, 41, 53, 0.92), rgba(99, 32, 43, 0.92));
      color: #fff;
      border: 1px solid rgba(194, 138, 87, 0.2);
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      box-shadow: var(--shadow-soft);
      transition: transform 0.25s ease, border-color 0.25s ease;
    }

    .close-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(194, 138, 87, 0.4);
    }

    .sidebar-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      cursor: pointer;
      box-shadow: var(--shadow-soft);
    }

    .gallery-layout {
      display: flex;
      flex: 1;
      height: calc(100dvh - 76px);
      position: relative;
    }

    .gallery-track {
      flex: 1;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      z-index: 1;
      align-items: center;
      background:
        radial-gradient(circle at top left, rgba(122, 51, 65, 0.12), transparent 24%),
        radial-gradient(circle at bottom right, rgba(184, 141, 99, 0.05), transparent 20%),
        linear-gradient(180deg, rgba(15, 20, 25, 0.98), rgba(11, 15, 19, 0.98));
    }

    .gallery-track::-webkit-scrollbar {
      display: none;
    }
    .gallery-track {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .slide {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 8px;
      box-sizing: border-box;
    }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transform-origin: center center;
      will-change: transform, opacity;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 4px;
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 0.45s ease-out, transform 0.45s ease-out;
      background-color: #10161c;
    }

    .slide img.loaded {
      opacity: 1;
      transform: scale(1);
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(28, 22, 19, 0.78);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 10;
      transition: 0.25s;
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
    }

    .nav-btn:hover {
      background: rgba(124, 41, 53, 0.88);
    }

    .prev {

    }
    .next {

    }

    @media (max-width: 768px) {

    @media (max-width: 420px) {

      }

      position: fixed;
      bottom: 0;
      left: 0;

      display: flex;

    .zoom-btn {

    .zoom-btn:active {

    .pagination {

    .dot {

    .sidebar-link::before {

    .sidebar-link:hover {

    .sidebar-link.active {

    .sidebar-link.active::before {

    .sidebar-scroll {
      overflow-y: auto;
      padding-right: 4px;
      max-height: calc(100dvh - 76px - 1.5rem);

    .sidebar-scroll::-webkit-scrollbar {

    .sidebar-scroll::-webkit-scrollbar-thumb {

    @media (max-width: 900px) {
      .sidebar-toggle {
        display: inline-flex;

      .sidebar-mobile-overlay {
        display: block;
        position: fixed;
        inset: 0;

        visibility: hidden;
        transition: opacity 0.25s ease, visibility 0.25s ease;

      .gallery-sidebar {
        position: fixed;

      body.sidebar-open .gallery-sidebar {

      body.sidebar-open .sidebar-mobile-overlay {

      .gallery-layout {

    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 10% 0%, rgba(184, 141, 99, 0.06), transparent 55%),
        radial-gradient(circle at 90% 0%, rgba(122, 51, 65, 0.16), transparent 60%),
        linear-gradient(135deg, #11171c, #0b1014);
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;

<body>

  <div id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text" id="loader-text">Cargando proyectoâ€¦</div>
    <div class="loader-sub">GalerÃ­a editorial en alta resoluciÃ³n</div>
  </div>

  <div class="top-bar">
    <div class="project-title" id="project-name">Cargandoâ€¦</div>
    <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="Ver proyectos" aria-expanded="false">
      <i class="fas fa-layer-group"></i>
    </button>
    <a href="index.html" class="close-btn">Volver</a>
  </div>

  <div class="gallery-layout">
    <div class="nav-btn prev" onclick="scrollSlide(-1)">&#10094;</div>
    <div class="nav-btn next" onclick="scrollSlide(1)">&#10095;</div>

    <div class="gallery-track" id="track"></div>

    <div class="pagination" id="pagination"></div>

    <div class="sidebar-mobile-overlay" id="sidebar-overlay"></div>

    <aside class="gallery-sidebar" id="gallery-sidebar">
      <div class="sidebar-title">Casos del portafolio</div>
      <p class="sidebar-blurb" id="sidebar-blurb" hidden></p>
      <div class="sidebar-scroll" id="sidebar-projects"></div>
    </aside>
  </div>

  <div class="page-index" id="page-index">1 / 1</div>

  <div class="bottom-bar">
    <button class="zoom-btn" type="button" onclick="zoom(-0.25)" aria-label="Alejar">
      <i class="fas fa-minus"></i>
    </button>
    <button class="zoom-btn" type="button" onclick="resetZoom()" aria-label="Restablecer zoom">
      <i class="fas fa-rotate-left"></i>
    </button>
    <button class="zoom-btn" type="button" onclick="zoom(0.25)" aria-label="Acercar">
      <i class="fas fa-plus"></i>
    </button>
  </div>

  <script src="data/portfolio-data.js"></script>
  <script>
    /* ========= DATOS REUTILIZADOS (FUENTE COMPARTIDA) ========= */
    const sharedData = window.MPPortfolioData || {};
    const db = sharedData.galleries || {};
    const galleryGroups = sharedData.galleryGroups || [];

    /* ========= VARIABLES GLOBALES (RESTO DEL SCRIPT DE GALERÃA) ========= */
    let currentSlide = 0;
    let currentZoom = 1;
    const track = document.getElementById("track");
    const pagination = document.getElementById("pagination");
    const projectNameElement = document.getElementById("project-name");
    const pageIndexElement = document.getElementById("page-index");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loader-text");
    const sidebarProjects = document.getElementById("sidebar-projects");
    const sidebarBlurb = document.getElementById("sidebar-blurb");
    const sidebarToggle = document.getElementById("sidebar-toggle");
    const sidebarOverlay = document.getElementById("sidebar-overlay");

    let totalSlides = 0;
    let images = [];
    let projectSequence = [];
    let currentProjectId = "";
    let touchStartX = 0;
    let touchStartY = 0;

    function renderSidebar() {
      if (!sidebarProjects) return;
      sidebarProjects.innerHTML = "";

      galleryGroups.forEach((group) => {
        const groupEl = document.createElement("div");
        groupEl.className = "sidebar-group";

        const titleEl = document.createElement("div");
        titleEl.className = "sidebar-group-title";
        titleEl.textContent = group.title;
        groupEl.appendChild(titleEl);

        group.items.forEach((projectId) => {
          const project = db[projectId];
          if (!project || project.visible === false) return;

          const link = document.createElement("a");
          link.href = `galerial.html?id=${projectId}`;
          link.className = "sidebar-link";
          link.dataset.projectId = projectId;
          link.innerHTML = `<span>${project.title}</span>`;
          link.addEventListener("click", () => setSidebarOpen(false));
          groupEl.appendChild(link);
        });

        if (groupEl.querySelector(".sidebar-link")) {
          sidebarProjects.appendChild(groupEl);
        }
      });
    }

    function getProjectId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function getInitialIndex() {
      const params = new URLSearchParams(window.location.search);
      const rawIndex = Number(params.get("index") || 0);
      return Number.isFinite(rawIndex) ? rawIndex : 0;
    }

    function buildProjectSequence() {
      return galleryGroups.flatMap((group) =>
        (group.items || []).filter((projectId) => {
          const project = db[projectId];
          return project && project.visible !== false;
        })
      );
    }

    function isMobileSidebarMode() {
      return window.innerWidth <= 900;
    }

    function setSidebarOpen(isOpen) {
      if (!isMobileSidebarMode()) {
        document.body.classList.remove("sidebar-open");
        if (sidebarToggle) sidebarToggle.setAttribute("aria-expanded", "false");
        return;
      }
      document.body.classList.toggle("sidebar-open", isOpen);
      if (sidebarToggle) sidebarToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    }

    function toggleSidebar() {
      setSidebarOpen(!document.body.classList.contains("sidebar-open"));
    }

    function navigateProject(direction) {
      if (!projectSequence.length || !currentProjectId) return;
      const currentIndex = projectSequence.indexOf(currentProjectId);
      if (currentIndex === -1) return;

      let nextIndex = currentIndex + direction;
      if (nextIndex < 0) nextIndex = projectSequence.length - 1;
      if (nextIndex >= projectSequence.length) nextIndex = 0;

      const nextProjectId = projectSequence[nextIndex];
      window.location.href = `galerial.html?id=${encodeURIComponent(nextProjectId)}`;
    }

    function highlightSidebar(projectId) {
      const links = document.querySelectorAll(".sidebar-link");
      links.forEach((link) => {
        link.classList.toggle("active", link.dataset.projectId === projectId);
      });
    }

    function showLoader(title) {
      if (loaderText && title) {
        loaderText.textContent = `Cargando ${title}â€¦`;
      }
      loader.classList.remove("hidden");
    }

    function hideLoader() {
      loader.classList.add("hidden");
    }

    function loadGallery() {
      const projectId = getProjectId();
      const project = db[projectId];
      currentProjectId = projectId || "";
      projectSequence = buildProjectSequence();

      renderSidebar();
      highlightSidebar(projectId || "");

      if (!project || project.visible === false) {
        projectNameElement.textContent = "Proyecto no encontrado";
        loaderText.textContent = "Proyecto no encontrado";
        if (sidebarBlurb) {
          sidebarBlurb.textContent = "";
          sidebarBlurb.hidden = true;
        }
        setTimeout(hideLoader, 800);
        return;
      }

      projectNameElement.textContent = project.title;
      showLoader(project.title);

      if (sidebarBlurb) {
        const summary = project.summary || "";
        if (summary) {
          sidebarBlurb.textContent = summary;
          sidebarBlurb.hidden = false;
        } else {
          sidebarBlurb.textContent = "";
          sidebarBlurb.hidden = true;
        }
      }

      images = project.images;
      totalSlides = images.length;
      track.innerHTML = "";
      pagination.innerHTML = "";

      if (!totalSlides) {
        hideLoader();
        return;
      }

      let pending = totalSlides;

      images.forEach((imgName, index) => {
        const slide = document.createElement("div");
        slide.className = "slide";

        const img = document.createElement("img");
        img.src = imgName;
        img.alt = `${project.title} â€“ Imagen ${index + 1}`;
        img.id = `img-${index}`;

        const done = () => {
          if (img.dataset.done) return;
          img.dataset.done = "1";

          if (img.complete && img.naturalWidth > 0) {
            img.classList.add("loaded");
          }

          pending--;
          if (pending <= 0) {
            hideLoader();
          }
        };

        img.addEventListener("load", done);
        img.addEventListener("error", done);

        slide.appendChild(img);
        track.appendChild(slide);

        const dot = document.createElement("div");
        dot.className = "dot";
        dot.onclick = () => updateSlideDisplay(index);
        pagination.appendChild(dot);
      });

      const initialIndex = Math.max(0, Math.min(getInitialIndex(), totalSlides - 1));
      updateSlideDisplay(initialIndex);
    }

    function updateSlideDisplay(index) {
      currentSlide = index;
      resetZoom();

      const scrollPos = track.clientWidth * index;
      track.scrollTo({ left: scrollPos, behavior: "smooth" });

      document.querySelectorAll(".dot").forEach((dot, i) => {
        dot.classList.toggle("active", i === currentSlide);
      });

      if (pageIndexElement) {
        pageIndexElement.textContent = `${currentSlide + 1} / ${totalSlides}`;
      }
    }

    function scrollSlide(direction) {
      let newIndex = currentSlide + direction;
      if (newIndex < 0) newIndex = totalSlides - 1;
      if (newIndex >= totalSlides) newIndex = 0;
      updateSlideDisplay(newIndex);
    }

    function zoom(factor) {
      let newZoom = currentZoom + factor;
      newZoom = Math.max(1, Math.min(3, newZoom));
      currentZoom = newZoom;

      const imgElement = document.getElementById(`img-${currentSlide}`);
      if (imgElement) {
        imgElement.style.transform = `scale(${currentZoom})`;
      }
    }

    function resetZoom() {
      currentZoom = 1;
      const imgElement = document.getElementById(`img-${currentSlide}`);
      if (imgElement) {
        imgElement.style.transform = "scale(1)";
      }
    }

    let scrollTimeout;
    track.addEventListener("scroll", () => {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        const center = track.scrollLeft + track.clientWidth / 2;
        const newIndex = Math.floor(center / track.clientWidth);
        if (newIndex !== currentSlide && newIndex >= 0 && newIndex < totalSlides) {
          updateSlideDisplay(newIndex);
        }
      }, 100);
    });

    track.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    track.addEventListener("touchend", (event) => {
      if (currentZoom > 1 || !isMobileSidebarMode() || document.body.classList.contains("sidebar-open")) return;
      const touch = event.changedTouches[0];
      const deltaX = touch.clientX - touchStartX;
      const deltaY = touch.clientY - touchStartY;
      if (Math.abs(deltaY) < 70 || Math.abs(deltaY) <= Math.abs(deltaX)) return;
      navigateProject(deltaY > 0 ? 1 : -1);
    }, { passive: true });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") scrollSlide(-1);
      if (e.key === "ArrowRight") scrollSlide(1);
      if (e.key === "ArrowDown") navigateProject(1);
      if (e.key === "ArrowUp") navigateProject(-1);
      if (e.key === "Escape") setSidebarOpen(false);
    });

    window.addEventListener("resize", () => {
      if (!isMobileSidebarMode()) setSidebarOpen(false);
    });

    if (sidebarToggle) {
      sidebarToggle.addEventListener("click", toggleSidebar);
    }

    if (sidebarOverlay) {
      sidebarOverlay.addEventListener("click", () => setSidebarOpen(false));
    }

    document.addEventListener("DOMContentLoaded", loadGallery);
  </script>
</body>
</html>
